set -g prefix C-h

unbind C-j
unbind C-k

unbind C-b

bind C-h send-prefix

set -sg escape-time 1

set -g base-index 1
setw -g pane-base-index 1

# tmux display in 256 colours; inherit the outer terminal's TERM
set -g default-terminal "${TERM}"
# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
set -as terminal-features ',xterm-256color:clipboard'
# tmux's native OSC52 emission sends an EMPTY selection field (]52;;) which iOS
# Blink Shell silently drops. Blink only accepts an explicit 'c' selection
# (]52;c;). tmux 3.x ignores any Ms terminal-override here, so the only fix is to
# emit ]52;c; ourselves from the copy-mode 'y' binding below (via passthrough).
# Keep set-clipboard OFF so tmux doesn't also emit the useless empty ]52;; copy.
set -s set-clipboard off

set -g default-shell $SHELL
set-option -g history-limit 5000

set -g focus-events on

bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# Session/window chooser: sort by activity (most-recent first) and use the
# larger pane preview (-N -N). Overrides tmux's default `choose-tree -Zs/-Zw`.
bind s choose-tree -Zs -O activity -N -N
bind w choose-tree -Zw -O activity -N -N

setw -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

set -g window-status-separator ''

set -g monitor-activity on
set -g visual-activity on

set -g status-left-length 90
set -g status-justify left

# pane border colors
set -g pane-border-indicators both
# double-line pane borders (═ / ║) instead of the default single line
set -g pane-border-lines double

# this line sets custom copy colors. these particular colors look cleaner
# with the solarized colorscheme
setw -g mode-style bg=brightmagenta,fg=black
set -g cursor-color '#cba6f7'
setw -g mode-keys vi
unbind [
unbind i
bind i copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Yank to the system clipboard via OSC52 with an explicit 'c' selection field,
# wrapped in tmux passthrough DCS and written to the pane tty so it reaches the
# outer terminal (e.g. iOS Blink over SSH). This mirrors how vim copies on Blink.
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "printf '\\033Ptmux;\\033\\033]52;c;%s\\007\\033\\\\' \"$(base64 | tr -d '\\n')\" > #{pane_tty}"
set -g allow-passthrough all


# automatially renumber windows
set-option -g renumber-windows on
# Appearance-aware colors (dark=Mocha, light=Latte); see tmux-appearance.sh.
# Startup detect below; `prefix r` re-detects on demand. Live switching is
# driven by the native client-*-theme hooks: tmux 3.6+ detects the client
# theme flip (OSC 11 / DEC 2031, forwarded by Ghostty) and fires these.
run-shell "~/Code/dotfiles/tmux-appearance.sh > /tmp/tmux-appearance-$$.conf && tmux source-file /tmp/tmux-appearance-$$.conf; rm -f /tmp/tmux-appearance-$$.conf"
# NOTE: the hook body must contain NO shell variable — tmux expands $vars in a
# stored set-hook body at parse time, which silently blanks e.g. a temp-file
# path. So the temp-file/source dance lives inside tmux-appearance.sh --apply.
set-hook -g client-light-theme 'run-shell "~/Code/dotfiles/tmux-appearance.sh --light --apply"'
set-hook -g client-dark-theme  'run-shell "~/Code/dotfiles/tmux-appearance.sh --dark --apply"'
